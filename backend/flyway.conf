# Flyway Configuration for Swing Trade Platform
# Database connection properties

# PostgreSQL JDBC connection URL
flyway.url=jdbc:postgresql://localhost:5432/swing_trade

# Database user
flyway.user=postgres

# Database password
flyway.password=postgres_password

# Locations to scan for migrations (relative to working directory)
# Convention: classpath:db/migration for JVM apps, can be file-based
flyway.locations=filesystem:./backend/migrations

# Default schema
flyway.defaultSchema=public

# Baseline version (if migrating from existing database without migration history)
# Leave commented for new databases
# flyway.baselineVersion=0
# flyway.baselineDescription=Initial baseline

# Migration naming pattern (Flyway default: V, ., _, lowercase letters)
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Validate migration checksums (recommended: true)
flyway.validateOnMigrate=true

# Out of order migrations (recommended: false - maintain strict version order)
flyway.outOfOrder=false

# Encoding for SQL migration files
flyway.encoding=UTF-8

# Placeholder replacement (optional)
# flyway.placeholderReplacement=true
# flyway.placeholders.db_owner=swing_trade_app
# flyway.placeholders.app_user=swing_trade_user

# Callbacks (optional - for custom logic)
# flyway.callbacks=

# If a schema is missing, create it (recommended: true for automation)
flyway.createSchemas=true
